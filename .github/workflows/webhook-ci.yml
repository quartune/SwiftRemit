name: Webhook System CI

on:
  push:
    branches: [main, feature/webhook-system]
    paths:
      - 'backend/**'
      - '.github/workflows/webhook-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/webhook-ci.yml'

jobs:
  test:
    name: Test Webhook System
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swiftremit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Setup database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_test
        run: |
          psql $DATABASE_URL -f migrations/webhook_schema.sql

      - name: Run linter
        working-directory: ./backend
        run: npm run lint || echo "Linter not configured yet"

      - name: Run webhook tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_test
          NODE_ENV: test
        run: npm run test:webhook

      - name: Run all tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_test
          NODE_ENV: test
        run: npm test

      - name: Check TypeScript compilation
        working-directory: ./backend
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run security audit
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run TypeScript checks
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Run linter
        working-directory: ./backend
        run: npm run lint || echo "Linter not configured"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swiftremit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Setup database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_test
        run: |
          psql $DATABASE_URL -f migrations/webhook_schema.sql
          psql $DATABASE_URL -f migrations/seed_webhook_test_data.sql || true

      - name: Start server
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_test
          PORT: 3000
          NODE_ENV: test
        run: |
          npm run dev &
          sleep 10

      - name: Test webhook health endpoint
        run: |
          curl -f http://localhost:3000/webhooks/health || exit 1

      - name: Test webhook endpoint (should fail without auth)
        run: |
          curl -X POST http://localhost:3000/webhooks/anchor \
            -H "Content-Type: application/json" \
            -d '{"event_type":"deposit_update","transaction_id":"test"}' \
            -w "%{http_code}" | grep -q "400\|401"
